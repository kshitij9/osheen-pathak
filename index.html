<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Osheen Pathak — Creative Director</title>
<meta name="description" content="Osheen Pathak, Creative Director. Created to be remembered." />
<style>
:root{ --bg:#000; }
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{
  background:var(--bg);color:#f4efe6;
  font-family:ui-monospace,monospace;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

/* Full-screen scroll-synced video (rendered as a canvas frame sequence) */
.film{position:fixed;inset:0;z-index:0;background:var(--bg);pointer-events:none}
.film canvas{width:100%;height:100%;display:block}

/* Progress hairline at the very bottom */
.progress{position:fixed;left:0;bottom:0;height:2px;z-index:10;
  width:calc(var(--p,0)*100%);background:#FCCC19;
  box-shadow:0 0 12px rgba(252,204,25,.6);transition:width .05s linear}

/* Scroll room that lets the scroll position scrub the film */
.scroll-track{position:relative;z-index:1;height:400svh;pointer-events:none}

:focus-visible{outline:2px solid #FCCC19;outline-offset:3px}
</style>
</head>
<body>

<h1 class="sr-only">Osheen Pathak — Creative Director. Created to be remembered.</h1>

<div class="film" aria-hidden="true"><canvas id="film"></canvas></div>
<div class="progress" aria-hidden="true"></div>

<!-- scroll room to scrub the film -->
<div class="scroll-track" id="top" aria-hidden="true"></div>

<script>
(function(){
  var root   = document.documentElement;
  var canvas = document.getElementById("film");
  var ctx    = canvas.getContext("2d", { alpha:false });

  // Vertical framing bias for the "cover" crop (0 = top, .5 = center, 1 = bottom).
  // Set per sequence in startSequence(); defaults to center.
  var FOCUS_Y = 0.5;

  var frames = [];
  var count  = 0;
  var ready  = false;
  var lastDrawn = -1;
  var dpr = Math.min(2, window.devicePixelRatio || 1);

  var cur = 0, target = 0;   // frame index (float) — lerped for smoothness
  var running = false;

  function scrollProgress(){
    var max = document.body.scrollHeight - window.innerHeight;
    if(max <= 0) return 0;
    return Math.min(1, Math.max(0, window.scrollY / max));
  }

  function sizeCanvas(){
    var w = canvas.clientWidth, h = canvas.clientHeight;
    var cw = Math.round(w * dpr), ch = Math.round(h * dpr);
    if(canvas.width !== cw || canvas.height !== ch){
      canvas.width = cw; canvas.height = ch;
      lastDrawn = -1; // force redraw at new size
      return true;
    }
    return false;
  }

  // Nearest loaded frame at or before i (avoids blank gaps while streaming in).
  function nearestLoaded(i){
    for(var k=i;k>=0;k--){ if(frames[k] && frames[k].complete && frames[k].naturalWidth) return k; }
    for(var j=i+1;j<count;j++){ if(frames[j] && frames[j].complete && frames[j].naturalWidth) return j; }
    return -1;
  }

  // Draw a single frame (already resolved to a loaded image) at a given opacity.
  function paint(img, alpha){
    var cw = canvas.width, ch = canvas.height;
    var iw = img.naturalWidth, ih = img.naturalHeight;
    // "cover" the viewport — the frame always fills the screen (edges of the
    // composition may crop on aspect ratios that aren't ~16:9).
    var scale = Math.max(cw/iw, ch/ih);
    var dw = iw*scale, dh = ih*scale;
    var dx = (cw - dw) / 2;
    var dy = (ch - dh) * FOCUS_Y;
    ctx.globalAlpha = alpha;
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.globalAlpha = 1;
  }

  // Render at a fractional frame position: crossfade the two nearest real
  // frames so 88 discrete stills read as continuous motion.
  function drawFrame(f){
    var i0 = Math.floor(f);
    var frac = f - i0;
    var a = nearestLoaded(i0);
    if(a < 0) return;
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    paint(frames[a], 1);
    if(frac > 0.001 && i0+1 < count){
      var b = nearestLoaded(i0+1);
      if(b > a){ paint(frames[b], frac); }
    }
    lastDrawn = f;
  }

  function loop(){
    var diff = target - cur;
    if(Math.abs(diff) < 0.01){ cur = target; }
    else { cur += diff * 0.16; }

    var resized = sizeCanvas();
    if(Math.abs(cur - lastDrawn) > 0.004 || resized) drawFrame(cur);

    if(Math.abs(target - cur) > 0.004){ requestAnimationFrame(loop); }
    else { running = false; }
  }
  function kick(){ if(!running){ running = true; requestAnimationFrame(loop); } }

  // Paint the exact target frame with no easing (used when the tab is hidden,
  // where requestAnimationFrame is paused).
  function paintNow(){
    sizeCanvas();
    cur = target;
    drawFrame(Math.max(0, Math.min(count-1, target)));
  }

  function onScroll(){
    var p = scrollProgress();
    root.style.setProperty("--p", p.toFixed(4));
    if(ready) target = p * (count - 1);
    if(document.hidden){ paintNow(); } else { kick(); }
  }

  function startSequence(manifest){
    // Reset state so this can also swap sequences (e.g. desktop <-> mobile).
    ready = false; lastDrawn = -1; cur = 0; target = 0;
    FOCUS_Y = (manifest.focusY == null) ? 0.5 : manifest.focusY;
    count = manifest.count;
    var pad = manifest.pad || 3;
    var pattern = manifest.pattern || "frames/f_%.webp";
    frames = new Array(count);
    for(var i=0;i<count;i++){
      var n = String(i+1); while(n.length < pad) n = "0"+n;
      var img = new Image();
      img.decoding = "async";
      img.onload = (function(im){ return function(){
        // Decode up-front so the first paint of each frame never stalls mid-scroll.
        if(im.decode){ im.decode().catch(function(){}); }
        if(!ready){ ready = true; sizeCanvas(); onScroll(); }
        else { lastDrawn = -1; if(document.hidden){ paintNow(); } else { kick(); } }
      };})(img);
      img.src = pattern.replace("%", n);
      frames[i] = img;
    }
  }

  window.addEventListener("scroll", onScroll, {passive:true});
  window.addEventListener("resize", function(){ dpr = Math.min(2, window.devicePixelRatio || 1); lastDrawn=-1; onScroll(); });
  document.addEventListener("visibilitychange", function(){
    if(!document.hidden){ running = false; lastDrawn = -1; onScroll(); }
  });

  // Manifests are inlined (not fetched) so they work on file:// too.
  // A portrait sequence is used on narrow screens; a 16:9 one otherwise.
  // focusY:0 top-anchors the crop so the top of the frame ("CREATED TO BE")
  // is never trimmed on viewports wider than the 16:9 clip.
  var DESKTOP = { count:213, pad:3, pattern:"frames/f_%.webp", focusY:0 };
  var MOBILE  = { count:191, pad:3, pattern:"frames_mobile/f_%.webp", focusY:0.5 };

  var mq = window.matchMedia("(max-width:680px)");
  var usingMobile = null;
  function pickSequence(){
    var m = mq.matches;
    if(m === usingMobile) return;   // already on the right set
    usingMobile = m;
    startSequence(m ? MOBILE : DESKTOP);
  }
  // Swap sequences if the viewport crosses the breakpoint (e.g. phone rotate).
  if(mq.addEventListener) mq.addEventListener("change", pickSequence);
  else if(mq.addListener) mq.addListener(pickSequence);
  pickSequence();
})();
</script>
</body>
</html>
